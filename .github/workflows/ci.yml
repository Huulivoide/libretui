name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier
        run: npx prettier --check src/

      - name: ESLint
        run: npx eslint src/

      - name: TypeScript
        run: npx tsc --noEmit
